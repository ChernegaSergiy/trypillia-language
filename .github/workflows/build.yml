name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native Windows x86_64
          - os: windows-latest
            target: windows-x86_64
            artifact_name: trypillia.exe
            cmake_args: ""
            
          # Native macOS Apple Silicon (M1/M2/M3)
          - os: macos-14
            target: macos-arm64
            artifact_name: trypillia
            cmake_args: ""
            
          # Native macOS Intel
          - os: macos-13
            target: macos-x86_64
            artifact_name: trypillia
            cmake_args: ""
            
          # Native Linux x86_64
          - os: ubuntu-latest
            target: linux-x86_64
            artifact_name: trypillia
            cmake_args: ""
            
          # Cross-compile Linux ARM64 (aarch64 / Raspberry Pi 4 64-bit)
          - os: ubuntu-latest
            target: linux-aarch64
            artifact_name: trypillia
            compiler_packages: "g++-aarch64-linux-gnu gcc-aarch64-linux-gnu"
            cmake_args: "-DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc"

          # Cross-compile Linux ARM32 (armhf / armv7l / Raspberry Pi 3)
          - os: ubuntu-latest
            target: linux-armhf
            artifact_name: trypillia
            compiler_packages: "g++-arm-linux-gnueabihf gcc-arm-linux-gnueabihf"
            cmake_args: "-DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc"
            
          # Cross-compile Android ARM64 (aarch64)
          - os: ubuntu-latest
            target: android-aarch64
            artifact_name: trypillia
            cmake_args: "-DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21"

          # Cross-compile Android ARM32 (armeabi-v7a)
          - os: ubuntu-latest
            target: android-armv7a
            artifact_name: trypillia
            cmake_args: "-DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=armeabi-v7a -DANDROID_PLATFORM=android-21"

    steps:
      - uses: actions/checkout@v4

      - name: Install Cross-Compilers (Linux)
        if: matrix.compiler_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler_packages }}

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. ${{ matrix.cmake_args }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd build
          cmake --build . --config Release --parallel 4

      - name: Rename Artifact
        shell: bash
        run: |
          cd build
          mv trypillia ${{ matrix.artifact_name }} || mv trypillia.exe ${{ matrix.artifact_name }} || mv Release/trypillia.exe ${{ matrix.artifact_name }}
          mv ${{ matrix.artifact_name }} trypillia-${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trypillia-${{ matrix.target }}
          path: build/trypillia-${{ matrix.target }}
